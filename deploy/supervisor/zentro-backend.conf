[program:zentrov2]
directory=/root/projects/zentro-appv2/backend
command=/root/projects/zentro-appv2/env/bin/gunicorn core.wsgi:application --bind 127.0.0.1:8002 --workers 2 --timeout 180 --graceful-timeout 30 --max-requests 1000 --max-requests-jitter 100 --worker-tmp-dir /dev/shm --limit-request-field_size 32768
autostart=true
autorestart=true
stderr_logfile=/root/projects/zentro-appv2/logs/gunicorn.err.log
stdout_logfile=/root/projects/zentro-appv2/logs/gunicorn.out.log
user=root
group=root
environment=LANG=en_US.UTF-8,LC_ALL=en_US.UTF-8,DJANGO_SETTINGS_MODULE=core.settingsprod
