# V2 (zentro-appv2) — production API
# Serves: zentroapp-backend.com + *.zentroapp-backend.com → gunicorn :8002
#
# Browser auth pages belong on the Next.js app host (*.zentroapp.app).
# If a client opens /login|/verify-company on the API host (misconfigured
# NEXT_PUBLIC_APP_HOST), redirect to the tenant app login.

map $host $zentro_v2_tenant {
    default "";
    ~*^(?!www\.)(?<zslug>[a-z0-9_-]+)\.zentroapp-backend\.com$ $zslug;
}

server {
    listen 443 ssl;
    server_name .zentroapp-backend.com;

    ssl_certificate /etc/letsencrypt/live/zentroapp-backend.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentroapp-backend.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # JWTs can exceed 16k when page_permissions are embedded (Admin / SUPER).
    client_header_buffer_size 64k;
    large_client_header_buffers 4 64k;
    client_max_body_size 50M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /root/projects/zentro-appv2/backend/staticfiles/;
    }

    # Frontend auth paths accidentally opened on API host → tenant Next.js login
    location ~ ^/(login|verify-company|sign-in|workspace|signup)(/|$) {
        if ($zentro_v2_tenant = "") {
            return 302 https://zentroapp.app/workspace;
        }
        return 302 https://$zentro_v2_tenant.zentroapp.app/login;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location /flower/static/ {
        proxy_pass http://127.0.0.1:5557/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /flower/ {
        proxy_pass http://127.0.0.1:5557/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        sub_filter 'href="/static/' 'href="/flower/static/';
        sub_filter 'src="/static/' 'src="/flower/static/';
        sub_filter_once off;
        sub_filter_types text/css text/javascript application/javascript application/json;
    }
}

server {
    listen 80;
    server_name .zentroapp-backend.com;
    return 301 https://$host$request_uri;
}
