# /etc/nginx/sites-available/zentro-api
# Serves: zentroapp-api.uncodedsolutions.com + *.zentroapp-api.uncodedsolutions.com

server {
    listen 443 ssl;
    server_name .zentroapp-api.uncodedsolutions.com;

    ssl_certificate /etc/letsencrypt/live/zentroapp-api.uncodedsolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentroapp-api.uncodedsolutions.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_header_buffer_size 16k;
    large_client_header_buffers 4 16k;
    client_max_body_size 50M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /root/projects/zentro-appv2/backend/staticfiles/;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location /flower/static/ {
        proxy_pass http://127.0.0.1:5557/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /flower/ {
        proxy_pass http://127.0.0.1:5557/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        sub_filter 'href="/static/' 'href="/flower/static/';
        sub_filter 'src="/static/' 'src="/flower/static/';
        sub_filter_once off;
        sub_filter_types text/css text/javascript application/javascript application/json;
    }
}

server {
    listen 80;
    server_name .zentroapp-api.uncodedsolutions.com;
    return 301 https://$host$request_uri;
}
