[program:zentro-celery-beat]
directory=/root/projects/zentro-app/zentro-backend
command=/root/projects/zentro-app/env/bin/celery -A core beat -l info
autostart=true
autorestart=true
stderr_logfile=/root/projects/zentro-app/logs/celery-beat.err.log
stdout_logfile=/root/projects/zentro-app/logs/celery-beat.out.log
user=root
group=root
environment=LANG=en_US.UTF-8,LC_ALL=en_US.UTF-8,DJANGO_SETTINGS_MODULE=core.settingsprod
