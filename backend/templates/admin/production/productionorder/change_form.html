{% extends "admin/change_form.html" %}
{% load i18n admin_urls static admin_modify %}

{% block submit_buttons_bottom %}
{{ block.super }}
<div class="submit-row">
    <input type="submit" value="Update Production Details" name="_update_production_details" class="default" 
           style="background-color: #417690; color: white; padding: 10px 15px; border: none; cursor: pointer; margin-left: 10px;"
           onclick="return confirm('This will refresh all production order lines based on the current BOM. Continue?');" />
    <input type="submit" value="Preview Posting" name="_preview_posting" class="default" 
           style="background-color: #28a745; color: white; padding: 10px 15px; border: none; cursor: pointer; margin-left: 10px;"
           onclick="return true;" />
</div>
{% endblock %}
