{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="favicon" href="{% static 'images/favicon.ico' %}" />

    <link
      rel="icon"
      type="image/png"
      href="{% static 'images/favicon-96x96.png' %}"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="{% static 'images/favicon.svg1' %}"
    />
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{% static 'apple-touch-icon.png' %}"
    />
    <link rel="manifest" href="{% static 'images/site.webmanifest' %}" />

    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/style.css' %}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/landing-page.css' %}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/custom.css' %}"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap JS (required for toast) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Helpers -->
    <script src="{% static 'js/app/helpers.js' %}"></script>

    <!-- Alpine -->
    <script src="{% static 'js/apline.min.js' %}" defer></script>
    <title>Zentro App | {% block title %} {% endblock %}</title>
  </head>
  <body>
    <div class="loader-wrapper">
      <div class="loader"></div>
    </div>

    {% block content %}{% endblock %}

    <!-- Notification Toast Container -->
    <div id="notification-toast" class="toast-wrapper top-end"></div>

    {% block scripts %} {% endblock %}
    <!-- Core JS -->
    <script src="{% static 'js/app.min.js' %}"></script>
    <!-- Core Vendors JS -->
    <script src="{% static 'js/vendors.min.js' %}"></script>
    <!-- htmx -->
    <script src="{% static 'js/htmx.min.js' %}" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <!-- Notification System Script -->
    <script>
      function showNotification(type, message) {
          const getIconColor = (type) => {
              switch(type) {
                  case 'Success': return 'text-emerald-400';
                  case 'Processing': return 'text-blue-400';
                  case 'Warning': return 'text-yellow-400';
                  case 'Error': return 'text-red-400';
                  default: return 'text-gray-400';
              }
          };

          const getIcon = (type) => {
              switch(type) {
                  case 'Success':
                      return '<svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20" height="1em" width="1em"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>';
                  case 'Processing':
                      return '<svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20" height="1em" width="1em"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V7z"></path></svg>';
                  case 'Warning':
                      return '<svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20" height="1em" width="1em"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"></path></svg>';
                  case 'Error':
                      return '<svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20" height="1em" width="1em"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"></path></svg>';
                  default:
                      return '<svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20" height="1em" width="1em"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"></path></svg>';
              }
          };

          const toastHtml = `
              <div class="toast fade show" role="alert" aria-live="assertive" aria-atomic="true">
                  <div class="notification ${type.toLowerCase()}">
                      <div class="notification-content">
                          <div class="mr-3">
                              <span class="text-2xl ${getIconColor(type)}">
                                  ${getIcon(type)}
                              </span>
                          </div>
                          <div class="mr-4">
                              <div class="notification-title">${type}</div>
                              <div class="notification-description">${message}</div>
                          </div>
                      </div>
                  </div>
              </div>`;

          const $toast = $(toastHtml);
          $('#notification-toast').append($toast);

          setTimeout(() => {
              $toast.fadeOut(300, function() {
                  $(this).remove();
              });
          }, 5000);
      }

      // Handle Django messages on page load
      $(document).ready(function() {
          {% if messages %}
              {% for message in messages %}
                  {% if message.tags == 'success' %}
                      showNotification('Success', '{{ message }}');
                  {% elif message.tags == 'error' %}
                      showNotification('Danger', '{{ message }}');
                  {% endif %}
              {% endfor %}
          {% endif %}
      });
    </script>

    <script>
      window.addEventListener("load", function () {
        const loader = document.querySelector(".loader-wrapper");
        loader.classList.add("loader-hidden");
      });
    </script>
    <script>
      function toggleImageSize() {
        const sidebarLogo = document.getElementById("sidebar-logo");
        const divSidebarClass =
          document.getElementsByClassName("side-nav-collapsed");
        console.log("asdfadsfasdf", divSidebarClass);
        if (divSidebarClass.length > 0) {
          // remove width
          sidebarLogo.style.width = "200px";
        } else {
          sidebarLogo.style.width = "90px";
        }
      }
    </script>
    <!-- Toast Script -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const toasts = document.querySelectorAll(".toast-message");

        toasts.forEach((toast) => {
          // Show toast
          setTimeout(() => {
            toast.classList.remove("opacity-0", "translate-x-full");
          }, 100);

          // Hide toast after 5 seconds
          setTimeout(() => {
            toast.classList.add("opacity-0", "translate-x-full");
            setTimeout(() => {
              toast.remove();
            }, 300);
          }, 5000);
        });
      });
    </script>
  </body>
</html>
