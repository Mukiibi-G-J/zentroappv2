<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify your Zentro account</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f3f4f6;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f3f4f6; border-radius: 8px;">
        <tr>
            <td style="padding: 24px;">
                <div style="text-align: center; margin-bottom: 24px;">
                    <img src="{{ logo_url }}" alt="Zentro" width="72" height="72" style="display: inline-block; border-radius: 12px;" />
                </div>
                <h1 style="color: #1e3a5f; text-align: center; margin: 0 0 8px; font-size: 22px;">Verify your account</h1>
                <p style="text-align: center; color: #6b7280; margin: 0 0 24px; font-size: 14px;">Enter this code on the verification screen</p>
                <div style="background-color: #ffffff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
                    <p style="margin: 0 0 16px;">Hi {{ username }},</p>
                    <p style="margin: 0 0 20px;">Use this one-time code to verify your email and finish signing in:</p>
                    <div style="text-align: center; margin: 28px 0;">
                        <span style="font-size: 32px; font-weight: bold; letter-spacing: 8px; padding: 12px 24px; background-color: #eff6ff; color: #1e40af; border-radius: 8px; border: 1px dashed #93c5fd;">{{ otp }}</span>
                    </div>
                    <p style="margin: 0 0 12px; font-weight: bold; color: #374151;">This code expires in 5 minutes.</p>
                    <p style="margin: 0; color: #6b7280; font-size: 14px;">If you did not try to sign in, you can ignore this email.</p>
                </div>
                <p style="text-align: center; font-size: 12px; color: #9ca3af; margin-top: 24px;">&copy; Zentro App. All rights reserved.</p>
            </td>
        </tr>
    </table>
</body>
</html>
