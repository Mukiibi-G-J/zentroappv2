{% if items %}
<div class="absolute z-10 w-full bg-white dark:bg-gray-800 shadow-lg rounded-md border border-gray-200 dark:border-gray-600 mt-1">
    {% for item in items %}
    <div 
        class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer"
        hx-get="{% url 'items:get-item-details' item.id %}"
        hx-target="#item-details"
        hx-swap="innerHTML"
    >
        <div class="font-medium">{{ item.item_name }}</div>
    </div>
    {% endfor %}
</div>
{% endif %}
