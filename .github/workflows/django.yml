name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/django.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/django.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zentro_ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: development
      DB_NAME: zentro_ci_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: core.settings

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate_schemas --shared

      - name: Run tests
        run: python manage.py test --verbosity=2

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Flake8 (critical)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  deploy:
    name: Deploy to DigitalOcean
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-backend-production
      cancel-in-progress: false
    defaults:
      run:
        working-directory: .

    steps:
      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.DO_HOST }}" ]; then
            echo "::error::DO_HOST secret is missing. Add it in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.DO_USER }}" ]; then
            echo "::error::DO_USER secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.DO_SSH_KEY }}" ]; then
            echo "::error::DO_SSH_KEY secret is missing."
            exit 1
          fi
          echo "Deploy secrets are configured."

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            export PATH="/root/.local/bin:${PATH}"
            cd /root/projects/zentro-appv2
            git fetch origin main
            git reset --hard origin/main
            source env/bin/activate
            uv pip install -r backend/requirements.txt
            cd backend
            export DJANGO_SETTINGS_MODULE=core.settingsprod
            python manage.py migrate_schemas --shared
            python manage.py migrate_schemas
            python manage.py collectstatic --noinput
            cp /root/projects/zentro-appv2/deploy/supervisor/*.conf /etc/supervisor/conf.d/
            supervisorctl reread
            supervisorctl update
            supervisorctl restart zentrov2 zentrov2-celery zentrov2-celery-beat
            supervisorctl status zentrov2 zentrov2-celery zentrov2-celery-beat
            for i in 1 2 3 4 5; do
              if curl -fsS -H "Host: zentroapp-api.uncodedsolutions.com" http://127.0.0.1:8002/admin/login/ -o /dev/null; then
                echo "API is healthy"
                exit 0
              fi
              echo "Waiting for API... ($i/5)"
              sleep 5
            done
            echo "Health check failed"
            exit 1
